t x="52" y="35" width="16" height="24" rx="5" class="fb"/><line x1="56" y1="59" x2="52" y2="112" stroke="#e8e0d5" stroke-width="7" stroke-linecap="round"/><line x1="64" y1="59" x2="68" y2="112" stroke="#e8e0d5" stroke-width="7" stroke-linecap="round"/><ellipse cx="50" cy="115" rx="7" ry="3" class="fb"/><ellipse cx="70" cy="115" rx="7" ry="3" class="fb"/><line x1="52" y1="45" x2="32" y2="45" stroke="#e8e0d5" stroke-width="6" stroke-linecap="round"><animate attributeName="x2" values="32;42;52;42;32" dur="1s" repeatCount="indefinite"/><animate attributeName="y2" values="45;26;45;64;45" dur="1s" repeatCount="indefinite"/></line><circle cx="32" cy="45" r="5" class="fb"><animate attributeName="cx" values="32;42;52;42;32" dur="1s" repeatCount="indefinite"/><animate attributeName="cy" values="45;26;45;64;45" dur="1s" repeatCount="indefinite"/></circle><line x1="68" y1="45" x2="88" y2="45" stroke="#e8e0d5" stroke-width="6" stroke-linecap="round"><animate attributeName="x2" values="88;78;68;78;88" dur="1s" repeatCount="indefinite"/><animate attributeName="y2" values="45;64;45;26;45" dur="1s" repeatCount="indefinite"/></line><circle cx="88" cy="45" r="5" class="fb"><animate attributeName="cx" values="88;78;68;78;88" dur="1s" repeatCount="indefinite"/><animate attributeName="cy" values="45;64;45;26;45" dur="1s" repeatCount="indefinite"/></circle></svg>`,"Bodyweight Squat":()=>`<svg viewBox="0 0 120 150" width="110" height="138" xmlns="http://www.w3.org/2000/svg">${fc()}<line x1="10" y1="140" x2="110" y2="140" class="fg"/>
function renderStep(){
  const cur=steps[stepIdx],isLast=stepIdx===steps.length-1,total=steps.length;
  document.getElementById('wo-step-counter').textContent=`${stepIdx+1}/${total}`;
  document.getElementById('progress-fill').style.width=`${(stepIdx/total)*100}%`;
  document.getElementById('phase-label-text').textContent=cur.phase;
  document.getElementById('phase-label-text').style.color=cur.phaseColor;
  document.getElementById('set-label-text').textContent=cur.setLabel||'';
  const main=document.getElementById('wo-main'),accent=BASE_WORKOUTS[currentDayIdx].accent;
  const nub=document.getElementById('next-up-box');
  if(stepIdx<total-1){const nx=steps[stepIdx+1];nub.style.display='block';document.getElementById('next-up-name').innerHTML=`${nx.name}${nx.reps?`<span class="next-up-detail"> · ${nx.reps} reps</span>`:''}${nx.duration?`<span class="next-up-detail"> · ${fmt(nx.duration)}</span>`:''}`;}else{nub.style.display='none';}
  const fig=`<div class="fig-wrap">${getAnim(cur.name)}</div>`;
  if(!started){main.innerHTML=`<div class="timed-wrap"><div class="ex-name serif">${cur.name}</div><p class="ex-note">${cur.note}</p>${fig}${cur.type==='timed'?`<div style="font-size:24px;color:${accent};font-family:'Playfair Display',serif;font-weight:900;margin-bottom:14px;">${fmt(cur.duration)}</div>`:''}${cur.type==='reps'?`<div class="reps-big" style="color:${accent};margin-bottom:12px;">${cur.reps}</div><div class="reps-label">REPS</div>`:''}<button class="btn-start" style="background:${accent};margin-top:16px;" onclick="handleStart()">START WORKOUT</button></div>`;return;}
  if(cur.type==='rest'){main.innerHTML=`<div class="rest-wrap"><div class="rest-eyebrow">REST</div>${fig}<div id="rest-circle-wrap" style="position:relative;display:inline-block;"><div class="svg-slot">${svgCircle(timerSeconds,totalSeconds,'#3a3a3c',150)}</div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><span class="rest-time-big">${fmt(timerSeconds)}</span></div></div><p class="rest-note">${cur.note}</p><button class="skip-btn" onclick="skipRest()">Skip Rest</button></div>`;}
  else if(cur.type==='timed'){main.innerHTML=`<div class="timed-wrap"><div class="ex-name serif">${cur.name}</div><p class="ex-note">${cur.note}</p>${fig}<div id="circle-timer-wrap" class="circle-timer-wrap"><div class="svg-slot">${svgCircle(timerSeconds,totalSeconds,cur.phaseColor||accent)}</div><div class="circle-timer-inner"><span class="circle-time-big">${fmt(timerSeconds)}</span><span class="circle-time-total">${fmt(cur.duration)}</span></div></div><div class="controls"><button class="btn-pause" id="pause-btn" onclick="togglePause()">⏸ Pause</button><button class="btn-main" style="background:${accent};" onclick="handleNext()">${isLast?'FINISH 🥊':'SKIP →'}</button></div></div>`;}
  else{main.innerHTML=`<div class="reps-wrap"><div class="ex-name serif">${cur.name}</div><p class="ex-note">${cur.note}</p>${fig}<div class="reps-big" style="color:${cur.phaseColor||accent};margin:14px 0 6px;">${cur.reps}</div><div class="reps-label">REPS</div><div style="margin-top:20px;"><button class="btn-main" style="background:${accent};width:100%;" onclick="handleNext()">${isLast?'FINISH 🥊':'DONE →'}</button></div></div>`;}
}
function togglePause(){paused=!paused;const btn=document.getElementById('pause-btn');if(paused){pauseTimer();if(btn)btn.textContent='▶ Resume';}else{resumeTimer();if(btn)btn.textContent='⏸ Pause';}}
function handleStart(){getCtx();started=true;requestWakeLock();document.getElementById('sound-legend').style.display='flex';const cur=steps[stepIdx];if(cur.type==='timed'){renderStep();startCountdown(()=>{startTimer(cur.duration);renderStep();});}else if(cur.type==='rest'){playRest();startTimer(cur.duration);renderStep();}else{renderStep();}}
function handleNext(){clearTimer();if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}advance();}
function skipRest(){clearTimer();advance();}
function advance(){if(stepIdx>=steps.length-1){showFinish();return;}stepIdx++;paused=false;const cur=steps[stepIdx];if(cur.type==='timed'){renderStep();startCountdown(()=>{startTimer(cur.duration);renderStep();});}else if(cur.type==='rest'){playRest();startTimer(cur.duration);renderStep();}else{renderStep();}}
function showFinish(){clearTimer();releaseWakeLock();const w=BASE_WORKOUTS[currentDayIdx];document.getElementById('finish-title').innerHTML=`${w.day}<br/>${w.label}`;document.getElementById('finish-sub').textContent=`Week ${currentWeek} done. Rest well — you earned it.`;document.getElementById('workout-screen').classList.remove('active');document.getElementById('finish-screen').classList.add('active');}
function goHome(){clearTimer();if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}releaseWakeLock();started=false;paused=false;stepIdx=0;document.getElementById('workout-screen').classList.remove('active');document.getElementById('finish-screen').classList.remove('active');document.getElementById('home-screen').style.display='';document.getElementById('sound-legend').style.display='none';}
function startWorkout(dayIdx){currentDayIdx=dayIdx;const w=overload(BASE_WORKOUTS,currentWeek)[dayIdx];steps=flattenSteps(w);stepIdx=0;started=false;paused=false;timerSeconds=0;totalSeconds=0;document.getElementById('wo-eyebrow').textContent=`${w.day} · WK ${currentWeek}`;document.getElementById('wo-eyebrow').style.color=w.accent;document.getElementById('wo-title').textContent=w.label;document.getElementById('progress-fill').style.background=w.accent;document.getElementById('home-screen').style.display='none';document.getElementById('finish-screen').classList.remove('active');document.getElementById('workout-screen').classList.add('active');renderStep();}
function renderHome(){document.getElementById('week-display').textContent=currentWeek;const pct=Math.floor((currentWeek-1)/2)*10;document.getElementById('overload-badge').textContent=currentWeek>=3?`+${pct}% LOAD`:'';document.getElementById('day-cards').innerHTML=BASE_WORKOUTS.map((w,i)=>`<div class="day-card" onclick="startWorkout(${i})"><div class="day-card-bar" style="background:${w.accent};"></div><div class="day-card-inner"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div><div class="day-eyebrow" style="color:${w.accent};">${w.day}</div><div class="day-title">${w.label}</div></div><div class="day-icon" style="color:${w.accent};">${w.icon}</div></div><div class="day-tags">${w.blocks.map(b=>`<span class="day-tag">${b.name}</span>`).join('')}</div><div class="day-arrow"><div class="day-arrow-line"></div><span class="day-arrow-text" style="color:${w.accent};">START →</span></div></div></div>`).join('');}
function changeWeek(delta){currentWeek=Math.max(1,currentWeek+delta);localStorage.setItem('cz_week',currentWeek);renderHome();}
renderHome();

const mblob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
